!! router1-startup.cfg
!! Role : Ingress PE  |  OSPF-TE + SR-MPLS  |  PCEP client (PCC)
!! Loopback0 : 100.100.100.101/32  prefix-SID 101 / algo128 SID 201 / algo129 SID 301
!! GE0 -> router2  100.101.102.101/24   metric 10   delay 100us   (TOP path)
!! GE1 -> router3  100.101.103.101/24   metric 20   delay  10us   (BOT path)
!! GE2 -> pc1 VRF100  10.1.1.3/24
!!
!! Policies configured on router1 (ingress):
!!   color 100  : dynamic via PCE  (IGP  metric)   --> PCE computes, prefers top path
!!   color 128  : dynamic via PCE  (DELAY metric)   --> PCE computes, prefers bot path
!!   color 200  : explicit forced VIA ROUTER2       --> labels [16102, 16104]
!!   color 300  : explicit forced VIA ROUTER3       --> labels [16103, 16104]

hostname router1
logging console debugging
logging monitor debugging

username cisco
 group root-lr
 group cisco-support
 secret C1sco12345
!
ssh server v2
ssh server vrf default
!

!! ── VRF 100 (CE-facing) ──────────────────────────────────────────────────
vrf 100
 address-family ipv4 unicast
  import route-target
   100:100
  !
  export route-policy SET_COLOR_100
  export route-target
   100:100
  !
 !
!

!! ── Interfaces ──────────────────────────────────────────────────────────
interface Loopback0
 no shut
 ipv4 address 100.100.100.101 255.255.255.255
!
interface MgmtEth0/RP0/CPU0/0
 no shut
 ipv4 address 10.10.20.101 255.255.255.0
!
interface GigabitEthernet0/0/0/0
 description to_router2_TOP_PATH
 no shut
 ipv4 address 100.101.102.101 255.255.255.0
!
interface GigabitEthernet0/0/0/1
 description to_router3_BOT_PATH
 no shut
 ipv4 address 100.101.103.101 255.255.255.0
!
interface GigabitEthernet0/0/0/2
 description to_pc1_VRF100
 no shut
 vrf 100
 ipv4 address 10.1.1.3 255.255.255.0
!

!! ── MPLS TE link delay ──────────────────────
mpls traffic-eng
 interface GigabitEthernet0/0/0/0
  admin-weight 10
  min-delay 100
 !
 interface GigabitEthernet0/0/0/1
  admin-weight 20
  min-delay 10
 !
!

!! ── Route policies ──────────────────────────────────────────────────────
extcommunity-set opaque COLOR_100
  100
end-set
!
route-policy SET_COLOR_100
  set extcommunity color COLOR_100
  pass
end-policy
!

!! ── OSPF ────────────────────────────────────────────────────────────────
router ospf 1
 router-id 100.100.100.101
 mpls traffic-eng router-id Loopback0
 mpls traffic-eng area 0
 segment-routing mpls
 segment-routing sr-prefer
 distribute link-state
 affinity-map blue bit-position 1
 affinity-map red  bit-position 0
 flex-algo 128
  metric-type delay
  advertise-definition
 !
 flex-algo 129
  advertise-definition
 !
 area 0
  mpls traffic-eng
  !!
  interface Loopback0
   passive enable
   prefix-sid index 101
   prefix-sid algorithm 128 index 201
   prefix-sid algorithm 129 index 301
  !
  interface GigabitEthernet0/0/0/0
   network point-to-point
   mpls traffic-eng
   cost 10
   fast-reroute per-link
  !
  interface GigabitEthernet0/0/0/1
   network point-to-point
   mpls traffic-eng
   cost 20
   fast-reroute per-link
  !
 !
!

!! ── BGP ─────────────────────────────────────────────────────────────────
!! BGP-LS  : send topology to PCE (pce = 100.100.100.107)
!! VPNv4   : direct iBGP peer with router4 (no RR in this lab)
router bgp 100
 bgp router-id 100.100.100.101
 bgp update-delay 0
 !
 address-family vpnv4 unicast
 !
 address-family link-state link-state
 !
 !! Direct VPNv4 peering with router4 (egress PE)
 neighbor 100.100.100.104
  remote-as 100
  update-source Loopback0
  address-family vpnv4 unicast
  !
 !
 !! BGP-LS to PCE
 neighbor 100.100.100.107
  remote-as 100
  update-source Loopback0
  address-family link-state link-state
  !
 !
 !!
 vrf 100
  rd 100.100.100.101:100
  address-family ipv4 unicast
   redistribute connected
  !
 !
!

!! ── Segment Routing ─────────────────────────────────────────────────────
segment-routing
 global-block 16000 18000
 traffic-eng
  !!
  !! Source address used in PCEP requests
  candidate-paths
   all
    source-address ipv4 100.100.100.101
   !
  !
  !!
  !! Explicit segment lists (static, no PCE needed)
  segment-list EXPLICIT-VIA-R2
   index 10 mpls label 16102
   index 20 mpls label 16104
  !
  segment-list EXPLICIT-VIA-R3
   index 10 mpls label 16103
   index 20 mpls label 16104
  !
  !!
  !! color 100  : dynamic via PCE, IGP metric  (PCE will choose top path = R2)
  on-demand color 100
   dynamic
    pcep
    !
    metric
     type igp
    !
   !
  !
  !!
  !! color 128  : dynamic via PCE, DELAY metric (PCE will choose bot path = R3)
  on-demand color 128
   dynamic
    pcep
    !
    sid-algorithm 128
    metric
     type latency
    !
   !
  !
  !!
  !! color 200  : EXPLICIT forced via router2 (top path)  no PCE needed
  policy SRTE-EXPLICIT-TOP
   color 200 end-point ipv4 100.100.100.104
   candidate-paths
    preference 100
     explicit segment-list EXPLICIT-VIA-R2
     !
    !
   !
  !
  !!
  !! color 300  : EXPLICIT forced via router3 (bot path)  no PCE needed
  policy SRTE-EXPLICIT-BOT
   color 300 end-point ipv4 100.100.100.104
   candidate-paths
    preference 100
     explicit segment-list EXPLICIT-VIA-R3
     !
    !
   !
  !
  !!
  !! PCEP session to the PCE
  pcc
   pce address ipv4 100.100.100.107
    precedence 10
   !
  !
 !
!
end
