!! pce-startup.cfg
!! Role : Stateful PCE  |  OSPF-TE + SR-MPLS + Flex-Algo
!! Loopback0 : 100.100.100.107/32  prefix-SID 107
!! GE0 -> router2  100.102.107.107/24
!!
!! Stateful PCE capabilities (XRd default) :
!!   Stateful / Update / Instantiation / Segment-Routing

hostname pce
logging console debugging
logging monitor debugging

username cisco
 group root-lr
 group cisco-support
 secret C1sco12345
!
ssh server v2
ssh server vrf default
!

!! ── PCE ─────────────────────────────────────────────────────────────────
pce
 address ipv4 100.100.100.107
 !! REST API: configurer apres boot
 !!  pce api user admin password Admin123!
 logging
  pcep pcerr-received
  no-path
 !
!

!! ── Interfaces ──────────────────────────────────────────────────────────
interface Loopback0
 no shut
 ipv4 address 100.100.100.107 255.255.255.255
!
interface MgmtEth0/RP0/CPU0/0
 no shut
 ipv4 address 10.10.20.107 255.255.255.0
!
interface GigabitEthernet0/0/0/0
 description to_router2
 no shut
 ipv4 address 100.102.107.107 255.255.255.0
!

!! ── MPLS TE ─────────────────────────────────────────────────────────────
mpls traffic-eng
 interface GigabitEthernet0/0/0/0
  admin-weight 1
  min-delay 1
 !
!

!! ── OSPF + Flex-Algo ─────────────────────────────────────────────────────
router ospf 1
 router-id 100.100.100.107
 mpls traffic-eng router-id Loopback0
 mpls traffic-eng area 0
 segment-routing mpls
 segment-routing sr-prefer
 affinity-map blue bit-position 1
 affinity-map red  bit-position 0
 !!
 !! FA128 : delay-metric, exclut liens "red" (meme definition que les routeurs)
 flex-algo 128
  metric-type delay
  advertise-definition
  affinity exclude-any red
 !
 !! FA129 : TE-metric, exclut liens "blue"
 flex-algo 129
  advertise-definition
  affinity exclude-any blue
 !
 area 0
  mpls traffic-eng
  interface Loopback0
   passive enable
   prefix-sid index 107
   prefix-sid algorithm 128 index 207
   prefix-sid algorithm 129 index 307
  !
  interface GigabitEthernet0/0/0/0
   network point-to-point
   mpls traffic-eng
   cost 1
  !
 !
!

!! ── BGP-LS collector ─────────────────────────────────────────────────────
router bgp 100
 bgp router-id 100.100.100.107
 bgp update-delay 0
 address-family link-state link-state
 !
 neighbor-group PCCs
  remote-as 100
  update-source Loopback0
  address-family link-state link-state
  !
 !
 neighbor 100.100.100.101
  use neighbor-group PCCs
 !
 neighbor 100.100.100.104
  use neighbor-group PCCs
 !
!

!! ── Segment Routing ─────────────────────────────────────────────────────
segment-routing
 global-block 16000 18000
!
end
