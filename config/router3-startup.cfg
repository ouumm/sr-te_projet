!! router3-startup.cfg
!! Role : Transit P  |  OSPF-TE + SR-MPLS
!! Loopback0 : 100.100.100.103/32  prefix-SID 103 / algo128 SID 203 / algo129 SID 303
!! GE0 -> router1  100.101.103.103/24   metric 20   delay  10us   (BOT path)
!! GE1 -> router4  100.103.104.103/24   metric 20   delay  10us   (BOT path)
!!
!! BOT path: LOW delay 10us => algo128 (delay-metric) PREFERS this path

hostname router3
logging console debugging
logging monitor debugging

username cisco
 group root-lr
 group cisco-support
 secret C1sco12345
!
ssh server v2
ssh server vrf default
!

!! ── Interfaces ──────────────────────────────────────────────────────────
interface Loopback0
 no shut
 ipv4 address 100.100.100.103 255.255.255.255
!
interface MgmtEth0/RP0/CPU0/0
 no shut
 ipv4 address 10.10.20.103 255.255.255.0
!
interface GigabitEthernet0/0/0/0
 description to_router1_BOT_PATH
 no shut
 ipv4 address 100.101.103.103 255.255.255.0
!
interface GigabitEthernet0/0/0/1
 description to_router4_BOT_PATH
 no shut
 ipv4 address 100.103.104.103 255.255.255.0
!

!! ── MPLS TE link delay ──────────────────────────────────────────────────
!! BOT path: LOW delay 10us => algo128 (delay) PREFERS this path
mpls traffic-eng
 interface GigabitEthernet0/0/0/0
  admin-weight 20
  min-delay 10
 !
 interface GigabitEthernet0/0/0/1
  admin-weight 20
  min-delay 10
 !
!

!! ── OSPF ────────────────────────────────────────────────────────────────
router ospf 1
 router-id 100.100.100.103
 mpls traffic-eng router-id Loopback0
 mpls traffic-eng area 0
 segment-routing mpls
 segment-routing sr-prefer
 affinity-map blue bit-position 1
 affinity-map red  bit-position 0
 flex-algo 128
  metric-type delay
  advertise-definition
 !
 flex-algo 129
  advertise-definition
 !
 area 0
  mpls traffic-eng
  interface Loopback0
   passive enable
   prefix-sid index 103
   prefix-sid algorithm 128 index 203
   prefix-sid algorithm 129 index 303
  !
  interface GigabitEthernet0/0/0/0
   network point-to-point
   mpls traffic-eng
   cost 20
   fast-reroute per-link
  !
  interface GigabitEthernet0/0/0/1
   network point-to-point
   mpls traffic-eng
   cost 20
   fast-reroute per-link
  !
 !
!

!! ── Segment Routing ─────────────────────────────────────────────────────
segment-routing
 global-block 16000 18000
!
end
