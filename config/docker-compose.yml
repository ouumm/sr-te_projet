networks:
  mgmt:
    driver_opts:
      com.docker.network.container_iface_prefix: xr-n05
    ipam:
      config:
      - subnet: 172.30.0.0/24
  pc1-router1:
    driver_opts:
      com.docker.network.container_iface_prefix: xr-n06
    ipam:
      config:
      - subnet: 10.1.1.0/24
  router1-gi0-router2-gi0:
    driver_opts:
      com.docker.network.container_iface_prefix: xr-n00
      com.docker.network.driver.mtu: 9000
    internal: true
    name: router1-gi0-router2-gi0
  router1-gi1-router3-gi0:
    driver_opts:
      com.docker.network.container_iface_prefix: xr-n01
      com.docker.network.driver.mtu: 9000
    internal: true
    name: router1-gi1-router3-gi0
  router2-gi1-router4-gi0:
    driver_opts:
      com.docker.network.container_iface_prefix: xr-n02
      com.docker.network.driver.mtu: 9000
    internal: true
    name: router2-gi1-router4-gi0
  router2-gi2-pce-gi0:
    driver_opts:
      com.docker.network.container_iface_prefix: xr-n04
      com.docker.network.driver.mtu: 9000
    internal: true
    name: router2-gi2-pce-gi0
  router3-gi1-router4-gi1:
    driver_opts:
      com.docker.network.container_iface_prefix: xr-n03
      com.docker.network.driver.mtu: 9000
    internal: true
    name: router3-gi1-router4-gi1
  router4-pc2:
    driver_opts:
      com.docker.network.container_iface_prefix: xr-n07
    ipam:
      config:
      - subnet: 10.3.1.0/24
services:
  pc1:
    cap_add:
    - NET_ADMIN
    command: /bin/sh -c "ip route add 10.0.0.0/8 via 10.1.1.3 && /bin/sh"
    container_name: pc1
    image: alpine:3.15
    networks:
      pc1-router1:
        ipv4_address: 10.1.1.2
    stdin_open: true
    tty: true
  pc2:
    cap_add:
    - NET_ADMIN
    command: /bin/sh -c "ip route add 10.0.0.0/8 via 10.3.1.104 && /bin/sh"
    container_name: pc2
    image: alpine:3.15
    networks:
      router4-pc2:
        ipv4_address: 10.3.1.2
    stdin_open: true
    tty: true
  pce:
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FSETID
    - FOWNER
    - MKNOD
    - NET_RAW
    - SETGID
    - SETUID
    - SETFCAP
    - SETPCAP
    - NET_BIND_SERVICE
    - SYS_CHROOT
    - KILL
    - AUDIT_WRITE
    - SYS_NICE
    - SYS_ADMIN
    - SYSLOG
    - SYS_RESOURCE
    - NET_ADMIN
    - SYS_PTRACE
    - IPC_LOCK
    cap_drop:
    - all
    container_name: pce
    devices:
    - /dev/fuse
    - /dev/net/tun
    environment:
      XR_EVERY_BOOT_CONFIG: /etc/xrd/startup.cfg
      XR_INTERFACES: linux:xr-n040,xr_name=Gi0/0/0/0
      XR_MGMT_INTERFACES: linux:xr-n050,xr_name=Mg0/RP0/CPU0/0,chksum
    image: ios-xr/xrd-control-plane:25.3.1
    networks:
      mgmt: null
      router2-gi2-pce-gi0: null
    pids_limit: -1
    security_opt:
    - apparmor=unconfined
    - label=disable
    stdin_open: true
    tty: true
    volumes:
    - source: ./pce-startup.cfg
      target: /etc/xrd/startup.cfg
      type: bind
    - pce:/xr-storage/
  router1:
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FSETID
    - FOWNER
    - MKNOD
    - NET_RAW
    - SETGID
    - SETUID
    - SETFCAP
    - SETPCAP
    - NET_BIND_SERVICE
    - SYS_CHROOT
    - KILL
    - AUDIT_WRITE
    - SYS_NICE
    - SYS_ADMIN
    - SYSLOG
    - SYS_RESOURCE
    - NET_ADMIN
    - SYS_PTRACE
    - IPC_LOCK
    cap_drop:
    - all
    container_name: router1
    devices:
    - /dev/fuse
    - /dev/net/tun
    environment:
      XR_EVERY_BOOT_CONFIG: /etc/xrd/startup.cfg
      XR_INTERFACES: linux:xr-n000,xr_name=Gi0/0/0/0;linux:xr-n010,xr_name=Gi0/0/0/1;linux:xr-n060,xr_name=Gi0/0/0/2,chksum
      XR_MGMT_INTERFACES: linux:xr-n050,xr_name=Mg0/RP0/CPU0/0,chksum
    image: ios-xr/xrd-control-plane:25.3.1
    networks:
      mgmt: null
      pc1-router1:
        ipv4_address: 10.1.1.3
      router1-gi0-router2-gi0: null
      router1-gi1-router3-gi0: null
    pids_limit: -1
    security_opt:
    - apparmor=unconfined
    - label=disable
    stdin_open: true
    tty: true
    volumes:
    - source: ./router1-startup.cfg
      target: /etc/xrd/startup.cfg
      type: bind
    - router1:/xr-storage/
  router2:
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FSETID
    - FOWNER
    - MKNOD
    - NET_RAW
    - SETGID
    - SETUID
    - SETFCAP
    - SETPCAP
    - NET_BIND_SERVICE
    - SYS_CHROOT
    - KILL
    - AUDIT_WRITE
    - SYS_NICE
    - SYS_ADMIN
    - SYSLOG
    - SYS_RESOURCE
    - NET_ADMIN
    - SYS_PTRACE
    - IPC_LOCK
    cap_drop:
    - all
    container_name: router2
    devices:
    - /dev/fuse
    - /dev/net/tun
    environment:
      XR_EVERY_BOOT_CONFIG: /etc/xrd/startup.cfg
      XR_INTERFACES: linux:xr-n000,xr_name=Gi0/0/0/0;linux:xr-n020,xr_name=Gi0/0/0/1;linux:xr-n040,xr_name=Gi0/0/0/2
      XR_MGMT_INTERFACES: linux:xr-n050,xr_name=Mg0/RP0/CPU0/0,chksum
    image: ios-xr/xrd-control-plane:25.3.1
    networks:
      mgmt: null
      router1-gi0-router2-gi0: null
      router2-gi1-router4-gi0: null
      router2-gi2-pce-gi0: null
    pids_limit: -1
    security_opt:
    - apparmor=unconfined
    - label=disable
    stdin_open: true
    tty: true
    volumes:
    - source: ./router2-startup.cfg
      target: /etc/xrd/startup.cfg
      type: bind
    - router2:/xr-storage/
  router3:
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FSETID
    - FOWNER
    - MKNOD
    - NET_RAW
    - SETGID
    - SETUID
    - SETFCAP
    - SETPCAP
    - NET_BIND_SERVICE
    - SYS_CHROOT
    - KILL
    - AUDIT_WRITE
    - SYS_NICE
    - SYS_ADMIN
    - SYSLOG
    - SYS_RESOURCE
    - NET_ADMIN
    - SYS_PTRACE
    - IPC_LOCK
    cap_drop:
    - all
    container_name: router3
    devices:
    - /dev/fuse
    - /dev/net/tun
    environment:
      XR_EVERY_BOOT_CONFIG: /etc/xrd/startup.cfg
      XR_INTERFACES: linux:xr-n010,xr_name=Gi0/0/0/0;linux:xr-n030,xr_name=Gi0/0/0/1
      XR_MGMT_INTERFACES: linux:xr-n050,xr_name=Mg0/RP0/CPU0/0,chksum
    image: ios-xr/xrd-control-plane:25.3.1
    networks:
      mgmt: null
      router1-gi1-router3-gi0: null
      router3-gi1-router4-gi1: null
    pids_limit: -1
    security_opt:
    - apparmor=unconfined
    - label=disable
    stdin_open: true
    tty: true
    volumes:
    - source: ./router3-startup.cfg
      target: /etc/xrd/startup.cfg
      type: bind
    - router3:/xr-storage/
  router4:
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FSETID
    - FOWNER
    - MKNOD
    - NET_RAW
    - SETGID
    - SETUID
    - SETFCAP
    - SETPCAP
    - NET_BIND_SERVICE
    - SYS_CHROOT
    - KILL
    - AUDIT_WRITE
    - SYS_NICE
    - SYS_ADMIN
    - SYSLOG
    - SYS_RESOURCE
    - NET_ADMIN
    - SYS_PTRACE
    - IPC_LOCK
    cap_drop:
    - all
    container_name: router4
    devices:
    - /dev/fuse
    - /dev/net/tun
    environment:
      XR_EVERY_BOOT_CONFIG: /etc/xrd/startup.cfg
      XR_INTERFACES: linux:xr-n020,xr_name=Gi0/0/0/0;linux:xr-n030,xr_name=Gi0/0/0/1;linux:xr-n070,xr_name=Gi0/0/0/2,chksum
      XR_MGMT_INTERFACES: linux:xr-n050,xr_name=Mg0/RP0/CPU0/0,chksum
    image: ios-xr/xrd-control-plane:25.3.1
    networks:
      mgmt: null
      router2-gi1-router4-gi0: null
      router3-gi1-router4-gi1: null
      router4-pc2:
        ipv4_address: 10.3.1.104
    pids_limit: -1
    security_opt:
    - apparmor=unconfined
    - label=disable
    stdin_open: true
    tty: true
    volumes:
    - source: ./router4-startup.cfg
      target: /etc/xrd/startup.cfg
      type: bind
    - router4:/xr-storage/
version: '2.4'
volumes:
  pce:
    name: pce
  router1:
    name: router1
  router2:
    name: router2
  router3:
    name: router3
  router4:
    name: router4
