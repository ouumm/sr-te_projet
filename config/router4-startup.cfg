!! router4-startup.cfg
!! Role : Egress PE  |  OSPF-TE + SR-MPLS  |  PCEP client (PCC)
!! Loopback0 : 100.100.100.104/32  prefix-SID 104 / algo128 SID 204 / algo129 SID 304
!! GE0 -> router2  100.102.104.104/24   metric 10   delay 100us   (TOP path)
!! GE1 -> router3  100.103.104.104/24   metric 20   delay  10us   (BOT path)
!! GE2 -> pc2 VRF100  10.3.1.104/24
!!
!! router4 exports VRF 100 routes with extcommunity color 100
!! This triggers on-demand SR policy on router1 (ingress)

hostname router4
logging console debugging
logging monitor debugging

username cisco
 group root-lr
 group cisco-support
 secret C1sco12345
!
ssh server v2
ssh server vrf default
!

!! ── VRF 100 (CE-facing) ──────────────────────────────────────────────────
vrf 100
 address-family ipv4 unicast
  import route-target
   100:100
  !
  export route-policy SET_COLOR_100
  export route-target
   100:100
  !
 !
!

!! ── Interfaces ──────────────────────────────────────────────────────────
interface Loopback0
 no shut
 ipv4 address 100.100.100.104 255.255.255.255
!
interface MgmtEth0/RP0/CPU0/0
 no shut
 ipv4 address 10.10.20.104 255.255.255.0
!
interface GigabitEthernet0/0/0/0
 description to_router2_TOP_PATH
 no shut
 ipv4 address 100.102.104.104 255.255.255.0
!
interface GigabitEthernet0/0/0/1
 description to_router3_BOT_PATH
 no shut
 ipv4 address 100.103.104.104 255.255.255.0
!
interface GigabitEthernet0/0/0/2
 description to_pc2_VRF100
 no shut
 vrf 100
 ipv4 address 10.3.1.104 255.255.255.0
!

!! ── MPLS TE link delay ──────────────────────────────────────────────────
mpls traffic-eng
 interface GigabitEthernet0/0/0/0
  admin-weight 10
  min-delay 100
 !
 interface GigabitEthernet0/0/0/1
  admin-weight 20
  min-delay 10
 !
!

!! ── Route policies ──────────────────────────────────────────────────────
extcommunity-set opaque COLOR_100
  100
end-set
!
route-policy SET_COLOR_100
  set extcommunity color COLOR_100
  pass
end-policy
!

!! ── OSPF ────────────────────────────────────────────────────────────────
router ospf 1
 router-id 100.100.100.104
 mpls traffic-eng router-id Loopback0
 mpls traffic-eng area 0
 segment-routing mpls
 segment-routing sr-prefer
 distribute link-state
 affinity-map blue bit-position 1
 affinity-map red  bit-position 0
 flex-algo 128
  metric-type delay
  advertise-definition
 !
 flex-algo 129
  advertise-definition
 !
 area 0
  mpls traffic-eng
  interface Loopback0
   passive enable
   prefix-sid index 104
   prefix-sid algorithm 128 index 204
   prefix-sid algorithm 129 index 304
  !
  interface GigabitEthernet0/0/0/0
   network point-to-point
   mpls traffic-eng
   cost 10
   fast-reroute per-link
  !
  interface GigabitEthernet0/0/0/1
   network point-to-point
   mpls traffic-eng
   cost 20
   fast-reroute per-link
  !
 !
!

!! ── BGP ─────────────────────────────────────────────────────────────────
router bgp 100
 bgp router-id 100.100.100.104
 bgp update-delay 0
 !
 address-family vpnv4 unicast
 !
 address-family link-state link-state
 !
 !! Direct VPNv4 peering with router1 (ingress PE)
 neighbor 100.100.100.101
  remote-as 100
  update-source Loopback0
  address-family vpnv4 unicast
  !
 !
 !! BGP-LS to PCE
 neighbor 100.100.100.107
  remote-as 100
  update-source Loopback0
  address-family link-state link-state
  !
 !
 !!
 vrf 100
  rd 100.100.100.104:100
  address-family ipv4 unicast
   redistribute connected
  !
 !
!

!! ── Segment Routing ─────────────────────────────────────────────────────
segment-routing
 global-block 16000 18000
 traffic-eng
  candidate-paths
   all
    source-address ipv4 100.100.100.104
   !
  !
  !!
  !! color 100  : dynamic via PCE, IGP metric  (return path R4->R1)
  on-demand color 100
   dynamic
    pcep
    !
    metric
     type igp
    !
   !
  !
  !!
  !! color 128  : dynamic via PCE, DELAY metric (return path)
  on-demand color 128
   dynamic
    pcep
    !
    sid-algorithm 128
    metric
     type latency
    !
   !
  !
  !!
  !! PCEP session to the PCE
  pcc
   pce address ipv4 100.100.100.107
    precedence 10
   !
  !
 !
!
end
