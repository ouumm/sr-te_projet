!! router2-startup.cfg
!! Role : Transit P  |  OSPF-TE + SR-MPLS
!! Loopback0 : 100.100.100.102/32  prefix-SID 102 / algo128 SID 202 / algo129 SID 302
!! GE0 -> router1  100.101.102.102/24   metric 10   delay 100us   (TOP path)
!! GE1 -> router4  100.102.104.102/24   metric 10   delay 100us   (TOP path)
!! GE2 -> pce      100.102.107.102/24   metric  1

hostname router2
logging console debugging
logging monitor debugging

username cisco
 group root-lr
 group cisco-support
 secret C1sco12345
!
ssh server v2
ssh server vrf default
!

!! ── Interfaces ──────────────────────────────────────────────────────────
interface Loopback0
 no shut
 ipv4 address 100.100.100.102 255.255.255.255
!
interface MgmtEth0/RP0/CPU0/0
 no shut
 ipv4 address 10.10.20.102 255.255.255.0
!
interface GigabitEthernet0/0/0/0
 description to_router1_TOP_PATH
 no shut
 ipv4 address 100.101.102.102 255.255.255.0
!
interface GigabitEthernet0/0/0/1
 description to_router4_TOP_PATH
 no shut
 ipv4 address 100.102.104.102 255.255.255.0
!
interface GigabitEthernet0/0/0/2
 description to_pce
 no shut
 ipv4 address 100.102.107.102 255.255.255.0
!

!! ── MPLS TE link delay ──────────────────────────────────────────────────

mpls traffic-eng
 interface GigabitEthernet0/0/0/0
  admin-weight 10
  min-delay 100
 !
 interface GigabitEthernet0/0/0/1
  admin-weight 10
  min-delay 100
 !
 interface GigabitEthernet0/0/0/2
  admin-weight 1
  min-delay 1
 !
!

!! ── OSPF ────────────────────────────────────────────────────────────────
router ospf 1
 router-id 100.100.100.102
 mpls traffic-eng router-id Loopback0
 mpls traffic-eng area 0
 segment-routing mpls
 segment-routing sr-prefer
 affinity-map blue bit-position 1
 affinity-map red  bit-position 0
 flex-algo 128
  metric-type delay
  advertise-definition
 !
 flex-algo 129
  advertise-definition
 !
 area 0
  mpls traffic-eng
  interface Loopback0
   passive enable
   prefix-sid index 102
   prefix-sid algorithm 128 index 202
   prefix-sid algorithm 129 index 302
  !
  interface GigabitEthernet0/0/0/0
   network point-to-point
   mpls traffic-eng
   cost 10
   fast-reroute per-link
  !
  interface GigabitEthernet0/0/0/1
   network point-to-point
   mpls traffic-eng
   cost 10
   fast-reroute per-link
  !
  interface GigabitEthernet0/0/0/2
   network point-to-point
   mpls traffic-eng
   cost 1
  !
 !
!

!! ── Segment Routing ─────────────────────────────────────────────────────
segment-routing
 global-block 16000 18000
!
end
